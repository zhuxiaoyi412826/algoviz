    <script>
    (function() {
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('algoviz-theme', theme);
            var btn = document.getElementById('themeToggle');
            if (btn) {
                var icon = btn.querySelector('.theme-icon');
                if (icon) {
                    icon.textContent = theme === 'dark' ? '🌙' : '☀️';
                }
            }
            document.body.style.background = theme === 'dark' ? '#0f0f23' : '#f5f7fa';
        }
        
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme') || 'light';
            var next = current === 'dark' ? 'light' : 'dark';
            setTheme(next);
        }
        
        // 访问量计数
        function updateVisitCount() {
            var count = localStorage.getItem('visitCount') || 0;
            
            // 检查当前浏览器是否已经记录过访问
            var hasVisited = localStorage.getItem('hasVisitedUnique');
            if (!hasVisited) {
                count = parseInt(count) + 1;
                localStorage.setItem('visitCount', count);
                localStorage.setItem('hasVisitedUnique', 'true');
            }
            
            var visitCountElement = document.getElementById('visitCount');
            if (visitCountElement) {
                visitCountElement.textContent = count;
            }
        }
        
        // 检查登录状态并更新头像
        function checkLoginStatus() {
            var isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            var navAvatar = document.getElementById('navAvatar');
            var profileLink = document.getElementById('profileLink');
            
            if (isLoggedIn) {
                var userAvatar = localStorage.getItem('userAvatar') || '👤';
                navAvatar.textContent = userAvatar;
                profileLink.href = '/pages/profile.html';
            } else {
                navAvatar.textContent = '👨';
                profileLink.href = '/pages/login.html';
            }
        }
        
        window.toggleTheme = toggleTheme;
        
        var saved = localStorage.getItem('algoviz-theme') || 'light';
        setTheme(saved);
        
        var btn = document.getElementById('themeToggle');
        if (btn) {
            btn.addEventListener('click', toggleTheme);
        }
        
        // 检查登录状态
        checkLoginStatus();
        
        // 更新访问量显示
        updateVisitCount();
    })();
    </script>

    <script>
        let captchaText = '';
        
        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
            let code = '';
            for (let i = 0; i < 4; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }
        
        function refreshCaptcha() {
            captchaText = generateCaptcha();
            document.getElementById('captchaCode').textContent = captchaText;
        }
        
        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('fileLabel').innerHTML = `📄 ${file.name}<br><small>已选择文件</small>`;
            }
        }
        
        async function submitForm(e) {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            
            const captchaInput = formData.get('captcha');
            if (captchaInput.toLowerCase() !== captchaText.toLowerCase()) {
                alert('验证码错误，请重新输入！');
                refreshCaptcha();
                form.captcha.value = '';
                return;
            }
            
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = '提交中...';
            
            try {
                const response = await fetch('http://localhost:80/api/feedback', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: formData.get('name'),
                        email: formData.get('contact'),
                        type: formData.get('type'),
                        title: '用户留言',
                        content: formData.get('content')
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('successModal').classList.add('show');
                    form.reset();
                    document.getElementById('fileLabel').innerHTML = '📎 点击选择文件或拖拽文件到此处<br><small>支持 JPG、PNG、PDF、Word 格式</small>';
                } else {
                    alert('提交失败：' + (data.message || '未知错误'));
                }
            } catch (error) {
                console.error('提交失败:', error);
                alert('网络异常，请稍后重试');
            } finally {
                refreshCaptcha();
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = '提交留言';
            }
        }
        
        function closeSuccessModal() {
            document.getElementById('successModal').classList.remove('show');
        }
        
        refreshCaptcha();
    </script>
</body>
</html>
